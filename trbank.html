<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRBank</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="phone">

<div class="header">

<h1>🏦 TRBank</h1>

<p>Dijital Bankacılık</p>

</div>

<div style="padding:20px;">

<div class="card">

<h3>💶 Mevcut Bakiye</h3>

<h1 id="balance" style="color:#0057b8;">0 €</h1>

<p class="small">
Güncel hesap bakiyesi
</p>

</div>

<div class="menu">

<div class="item" id="sendMoneyBtn">

<div class="icon">💸</div>

<h3>Para Gönder</h3>

<p>Kullanıcıya para gönder</p>

</div>

<div class="item" id="requestMoneyBtn">

<div class="icon">📩</div>

<h3>Para İste</h3>

<p>Ödeme talebi oluştur</p>

</div>

<a href="deposit.html">

<div class="item">

<div class="icon">📷</div>

<h3>Euro Yükle</h3>

<p>Dekont gönder</p>

</div>

</a>

<div class="item" id="historyBtn">

<div class="icon">📜</div>

<h3>Geçmiş</h3>

<p>İşlem kayıtları</p>

</div>

</div>

<div class="card">

<h3>📜 Son İşlemler</h3>

<div id="historyList">

Yükleniyor...

</div>

</div>

<button onclick="location.href='home.html'">

⬅ Ana Sayfa

</button>

</div>

</div>
