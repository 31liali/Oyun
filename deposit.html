<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRBank - Euro Yükleme</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="phone">

<div class="header">

<h1>💶 Euro Yükleme</h1>

<p>TRBank Bakiye Yükleme</p>

</div>

<div class="card">

<h3>Yüklenecek Miktar</h3>

<input
id="euroAmount"
type="number"
placeholder="Örn: 250">

<h3>Dekont / Fotoğraf</h3>

<input
id="euroImage"
type="file"
accept="image/*">

<br><br>

<button id="sendDepositBtn">

📤 Yöneticiye Gönder

</button>

</div>

<div class="card">

<h3>Bilgilendirme</h3>

<p>
📌 Dekont yöneticiye gönderilir.
</p>

<p>
✅ Onaylandıktan sonra bakiyenize otomatik eklenir.
</p>

<p>
❌ Reddedilirse herhangi bir para yüklenmez.
</p>

</div>

<button onclick="location.href='trbank.html'">

⬅ TRBank'a Dön

</button>

</div>

<script type="module" src="./deposit.js"></script>

</body>
</html>
